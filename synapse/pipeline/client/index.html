<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Синапс</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0b0f14">
  <link rel="stylesheet" href="./style.css">
  <script defer src="./reconnect.js"></script>
  <script type="module" src="./app.js"></script>
</head>
<body id="home">
  <aside id="sidebar">
    <div id="side-head">
      <h1>Синапс</h1>
      <div id="kora-dot" title="Кора"></div>
    </div>
    <ul id="projects-list"></ul>
    <button id="add-project" type="button">+ проект</button>
  </aside>
  <main>
    <ul id="threads-list"></ul>
    <p id="conn-status" hidden></p>
    <footer>
      <input id="msg-input" type="text" placeholder="Напиши диспетчеру…" autocomplete="off">
      <button id="msg-send" type="button">➤</button>
      <button id="mic-btn" type="button">🎙</button>
    </footer>
  </main>
  <div id="picker" hidden>
    <div id="picker-panel">
      <p id="picker-path"></p>
      <ul id="picker-dirs"></ul>
      <div id="picker-actions">
        <button id="picker-choose" type="button">Выбрать эту папку</button>
        <button id="picker-cancel" type="button">Отмена</button>
      </div>
    </div>
  </div>
  <audio id="bot-audio" autoplay playsinline></audio>
</body>
</html>
